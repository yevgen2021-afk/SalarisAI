<!doctype html>
<html lang="ru" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SalarisAI" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>SalarisAI</title>
    <script>
      (function() {
        try {
          var mode = localStorage.getItem('salaris_theme_mode');
          var isDark = false;
          if (mode === 'dark') {
            isDark = true;
          } else if (mode === 'light') {
            isDark = false;
          } else {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.add('light');
          }
        } catch (e) {}
      })();
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap');
      
      body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
      }
      
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
        z-index: 9999;
      }

      html.dark body, html.dark #splash-screen {
        background-color: #0a0a0a;
      }

      .splash-logo {
        font-family: 'Outfit', sans-serif;
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.05em;
        color: #111827;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      html.dark .splash-logo {
        color: #ffffff;
      }

      .splash-logo span {
        color: #06b6d4; /* Laguna (cyan-500) */
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML = '<div style="color:red;padding:20px;background:black;height:100vh;"><h1>Global Error</h1><pre>' + (e.error ? e.error.stack : e.message) + '</pre></div>';
      });
    </script>
    <div id="root">
      <div id="splash-screen">
        <div class="splash-logo">salaris<span>ai</span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
